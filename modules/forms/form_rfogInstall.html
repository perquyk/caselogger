<form id="rfoginstallForm">
    <h1>RFoG Install</h1>
    <br>
    <!-- Row 1: Task, Klantnummer -->
    <div class="row">
        <div class="col mb-3">
            <label for="task">Task:</label>
            <input type="text" id="task" name="task" class="form-control" required>
        </div>
        <div class="col mb-3">
            <label for="klantnummer">Klantnummer:</label>
            <input type="text" id="klantnummer" name="klantnummer" class="form-control" required>
        </div>
    </div>
    <!-- Row 2: Adres -->
    <div class="row">
        <div class="col mb-3">
            <label for="adres">Adres:</label>
            <input type="text" id="adres" name="adres" class="form-control" required>
        </div>
    </div>
    <!-- Row 3: Omschrijving taak -->
    <div class="row">
        <div class="col mb-3">
            <label for="omschrijving">Omschrijving taak:</label>
            <textarea id="omschrijving" name="omschrijving" rows="3" class="form-control" required></textarea>
        </div>
    </div>
    <!-- Row 4: patch length, MDR positie , patch pos rechts -->
    <div class="row">
        <div class="col mb-3">
            <label for="patchlength">Patch length</label>
            <select id="patchlength" name="patchlength" class="form-control">
                <option value="N/A">nvt</option>
                <option value="SC-LC 2m">SC-LC 2m</option>
                <option value="SC-LC 3m">SC-LC 3m</option>
                <option value="SC-SC 2m">SC-SC 2m</option>
                <option value="SC-SC 1m">SC-SC 1m</option>
            </select>
        </div>
        <div class="col mb-3">
            <label for="MDRpos">Patch MDR Postitie:</label>
            <input id="MDRpos" name="MDRpos" class="form-control">
        </div>
        <div class="col mb-3">
            <label for="LCpos">Patch positie rechts:</label>
            <input id="LCpos" name="LCpos" class="form-control">
        </div>
    </div>
    <!-- Row 5: Acties -->
    <div class="row">
        <div class="col mb-3">
            <label for="acties">Acties:</label>
            <textarea id="acties" name="acties" rows="3" class="form-control" required></textarea>
        </div>
    </div>
    <!-- Row 6: Materiaal -->
    <div class="row">
        <div class="col mb-3">
            <label for="materiaal">Materiaal:</label>
            <textarea id="materiaal" name="materiaal" rows="3" class="form-control" required></textarea>
        </div>
    </div>
    <!-- Row 7: Resultaat, Modemtest -->
    <div class="row">
        <div class="col mb-3">
            <label for="resultaat">Resultaat:</label>
            <textarea id="resultaat" name="resultaat" rows="2" class="form-control" required></textarea>
        </div>
        <div class="col mb-3">
            <label for="modemtest">Modemtest:</label>
            <textarea type="text" id="modemtest" name="modemtest" class="form-control" required></textarea>
        </div>
    </div>
    <!-- Buttons -->
    <div class="mt-4 text-center">
        <button type="button" class="btn btn-primary btn-lg me-2" onclick="rfogInstallToTXT()"><i class="bi bi-file-earmark-arrow-down"></i> Download .txt-file</button>
        <button type="button" class="btn btn-primary btn-lg ms-2" id="copyBtn" onclick="rfogInstallToClipboard()"><i class="bi bi-copy"></i> Copy to Clipboard</button>
    </div>
</form>
