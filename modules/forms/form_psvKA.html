<form id="psvKAForm">
    <h1>Woli - PSV KA</h1>
    <hr class="mb-1">
    <!-- ROW 1 -->
    <div class="row">
        <h4 class="mt-3">Klant info</h4>
        <!-- Tasknummer -->
        <div class="col mb-3">
            <div class="input-group mt-3">
                <span class="input-group-text">WOLI</span>
                <input type="text" id="woli" name="woli" class="form-control"required>
            </div>
        </div>
    </div>
    <!-- ROW 2 -->
    <div class="row">
        <!-- Adres -->
        <div class="col mb-3">
            <div class="input-group">
                <span class="input-group-text">Adres</span>
                <input type="text" id="adres" name="adres" class="form-control" required>
            </div>
        </div>
    </div>
    <hr class="mb-4">
    <!-- Row 5 -->
    <div class="row">
        <!-- Acties -->
        <h4>Opmerkingen/issues</h4>
        <div class="col mb-3">
            <div class="input-group">
                <span class="input-group-text">Opmerkingen</span>
                <textarea id="remarks" name="remarks" rows="3" required class="form-control"></textarea>
            </div>
        </div>
    </div>
    <hr class="mb-4">
    <!-- Row 6 -->
    <div class="row">
        <h4 class="mb-3">Finishing up</h4>
        <!-- Materiaal -->
        <div class="col mb-3">
            <div class="input-group">
                <span class="input-group-text">Nodig materiaal</span>
                <textarea id="materiaal" name="materiaal" rows="3" class="form-control" required></textarea>
            </div>
        </div>
    </div>
    <!-- ROW 8 -->
    <div class="row">
        <div class="col mb-3">
            <div class="input-group">
                <span class="input-group-text">Resultaat</span>
                <textarea id="resultaat" name="resultaat" rows="3" class="form-control" required></textarea>
            </div>
        </div>
    </div>

    <!-- Buttons -->
    <div class="mt-4 text-center">
        <button type="button" class="btn btn-primary btn-lg me-2" onclick="psvkaToTXT()"><i class="bi bi-file-earmark-arrow-down"></i> Download .txt-file</button>
        <button type="button" class="btn btn-primary btn-lg ms-2" id="copyBtn" onclick="psvkaToClipboard()"><i class="bi bi-copy"></i> Copy to Clipboard</button>
    </div>
</form>
